openapi: 3.0.3
info:
  title: Soundcloud-like API
  version: 0.1.0
  description: Backend API for auth, music upload, track listing and audio streaming.
servers:
  - url: http://localhost:8080
tags:
  - name: Health
  - name: Auth
  - name: Tracks
paths:
  /health:
    get:
      tags: [Health]
      summary: Healthcheck
      responses:
        "200":
          description: API is alive
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
  /api/v1/auth/register:
    post:
      tags: [Auth]
      summary: Register user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/v1/tracks:
    get:
      tags: [Tracks]
      summary: List tracks
      responses:
        "200":
          description: Track list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Track"
    post:
      tags: [Tracks]
      summary: Upload track
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [title, audio]
              properties:
                title:
                  type: string
                  example: My First Track
                artist:
                  type: string
                  example: Demo Artist
                audio:
                  type: string
                  format: binary
      responses:
        "201":
          description: Track uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Track"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/v1/tracks/{id}:
    get:
      tags: [Tracks]
      summary: Get track metadata
      parameters:
        - $ref: "#/components/parameters/TrackID"
      responses:
        "200":
          description: Track metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Track"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/tracks/{id}/stream:
    get:
      tags: [Tracks]
      summary: Stream track audio
      parameters:
        - $ref: "#/components/parameters/TrackID"
        - name: Range
          in: header
          required: false
          schema:
            type: string
            example: bytes=0-
      responses:
        "200":
          description: Audio stream
          content:
            audio/mpeg:
              schema:
                type: string
                format: binary
            audio/wav:
              schema:
                type: string
                format: binary
            audio/ogg:
              schema:
                type: string
                format: binary
        "206":
          description: Partial audio stream
        "404":
          $ref: "#/components/responses/NotFound"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    TrackID:
      name: id
      in: path
      required: true
      schema:
        type: string
      example: 8d769de1f6a04a1bf333e29e2f6a5c2d
  schemas:
    RegisterRequest:
      type: object
      required: [email, username, password]
      properties:
        email:
          type: string
          format: email
          example: demo@example.com
        username:
          type: string
          example: demo
        password:
          type: string
          minLength: 8
          example: password123
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: demo@example.com
        password:
          type: string
          example: password123
    AuthResult:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
    User:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        username:
          type: string
        created_at:
          type: string
          format: date-time
    Track:
      type: object
      properties:
        id:
          type: string
        owner_id:
          type: string
        title:
          type: string
        artist:
          type: string
        filename:
          type: string
        content_type:
          type: string
          example: audio/mpeg
        size:
          type: integer
          format: int64
        created_at:
          type: string
          format: date-time
    Error:
      type: object
      properties:
        error:
          type: string
  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
