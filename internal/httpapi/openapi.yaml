openapi: 3.0.3
info:
  title: Soundcloud-like API
  version: 0.2.0
  description: Backend API for auth, albums, music upload, track covers, track listing and audio streaming.
servers:
  - url: http://localhost:8080
tags:
  - name: Health
  - name: Auth
  - name: Tracks
  - name: Albums
paths:
  /health:
    get:
      tags: [Health]
      summary: Healthcheck
      responses:
        "200":
          description: API is alive
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
  /api/v1/auth/register:
    post:
      tags: [Auth]
      summary: Register user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/v1/auth/telegram:
    post:
      tags: [Auth]
      summary: Login or register with Telegram
      description: Accepts data from Telegram Login Widget. The API validates the Telegram hash with TELEGRAM_BOT_TOKEN and returns the same JWT auth result as email login.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TelegramAuthRequest"
      responses:
        "200":
          description: Logged in or registered with Telegram
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          description: Telegram auth is not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/tracks:
    get:
      tags: [Tracks]
      summary: List tracks
      responses:
        "200":
          description: Track list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Track"
    post:
      tags: [Tracks]
      summary: Upload track
      description: Artist is set automatically from the authenticated user's username.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [title, audio]
              properties:
                title:
                  type: string
                  example: My First Track
                album_id:
                  type: string
                  description: Optional album id owned by the authenticated user.
                  example: 38104d69c36c45b986b3a8cecebc4f3d
                audio:
                  type: string
                  format: binary
                cover:
                  type: string
                  format: binary
                  description: Optional jpeg, png, webp or gif image up to 10MB.
      responses:
        "201":
          description: Track uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Track"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/v1/tracks/{id}:
    get:
      tags: [Tracks]
      summary: Get track metadata
      parameters:
        - $ref: "#/components/parameters/TrackID"
      responses:
        "200":
          description: Track metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Track"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/tracks/{id}/stream:
    get:
      tags: [Tracks]
      summary: Stream track audio
      parameters:
        - $ref: "#/components/parameters/TrackID"
        - name: Range
          in: header
          required: false
          schema:
            type: string
            example: bytes=0-
      responses:
        "200":
          description: Audio stream
          content:
            audio/mpeg:
              schema:
                type: string
                format: binary
            audio/wav:
              schema:
                type: string
                format: binary
            audio/ogg:
              schema:
                type: string
                format: binary
        "206":
          description: Partial audio stream
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/tracks/{id}/cover:
    get:
      tags: [Tracks]
      summary: Get track cover image
      parameters:
        - $ref: "#/components/parameters/TrackID"
      responses:
        "200":
          description: Cover image
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
            image/png:
              schema:
                type: string
                format: binary
            image/webp:
              schema:
                type: string
                format: binary
            image/gif:
              schema:
                type: string
                format: binary
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/albums:
    get:
      tags: [Albums]
      summary: List albums
      responses:
        "200":
          description: Album list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Album"
    post:
      tags: [Albums]
      summary: Create album
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAlbumRequest"
      responses:
        "201":
          description: Album created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Album"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/v1/albums/{id}:
    get:
      tags: [Albums]
      summary: Get album metadata
      parameters:
        - $ref: "#/components/parameters/AlbumID"
      responses:
        "200":
          description: Album metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Album"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/albums/{id}/tracks:
    get:
      tags: [Albums]
      summary: List album tracks
      parameters:
        - $ref: "#/components/parameters/AlbumID"
      responses:
        "200":
          description: Album track list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Track"
        "404":
          $ref: "#/components/responses/NotFound"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    TrackID:
      name: id
      in: path
      required: true
      schema:
        type: string
      example: 8d769de1f6a04a1bf333e29e2f6a5c2d
    AlbumID:
      name: id
      in: path
      required: true
      schema:
        type: string
      example: 38104d69c36c45b986b3a8cecebc4f3d
  schemas:
    RegisterRequest:
      type: object
      required: [email, username, password]
      properties:
        email:
          type: string
          format: email
          example: demo@example.com
        username:
          type: string
          example: demo
        password:
          type: string
          minLength: 8
          example: password123
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: demo@example.com
        password:
          type: string
          example: password123
    TelegramAuthRequest:
      type: object
      required: [id, auth_date, hash]
      properties:
        id:
          type: integer
          format: int64
          example: 123456789
        first_name:
          type: string
          example: Demo
        last_name:
          type: string
          example: User
        username:
          type: string
          example: demo_user
        photo_url:
          type: string
          format: uri
          example: https://t.me/i/userpic/320/demo.jpg
        auth_date:
          type: integer
          format: int64
          description: Unix timestamp from Telegram Login Widget.
          example: 1714564800
        hash:
          type: string
          description: Telegram Login Widget HMAC hash.
    AuthResult:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
    User:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        username:
          type: string
        telegram_id:
          type: string
        created_at:
          type: string
          format: date-time
    Track:
      type: object
      properties:
        id:
          type: string
        owner_id:
          type: string
        album_id:
          type: string
        title:
          type: string
        artist:
          type: string
          description: Username of the track owner.
        filename:
          type: string
        content_type:
          type: string
          example: audio/mpeg
        size:
          type: integer
          format: int64
        cover_filename:
          type: string
        cover_content_type:
          type: string
          example: image/jpeg
        cover_size:
          type: integer
          format: int64
        created_at:
          type: string
          format: date-time
    Album:
      type: object
      properties:
        id:
          type: string
        owner_id:
          type: string
        title:
          type: string
        description:
          type: string
        created_at:
          type: string
          format: date-time
    CreateAlbumRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string
          example: Debut Album
        description:
          type: string
          example: Collection of early tracks.
    Error:
      type: object
      properties:
        error:
          type: string
  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
