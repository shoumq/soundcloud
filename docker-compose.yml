services:
  frontend:
    build: ../soundcloud-front
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped

  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      HTTP_ADDR: ":8080"
      JWT_SECRET: "dev-secret-change-me"
      ALLOWED_ORIGINS: "*"
      DATABASE_URL: "postgres://soundcloud:soundcloud@postgres:5432/soundcloud?sslmode=disable"
      STORAGE_DRIVER: "s3"
      S3_ENDPOINT: "minio:9000"
      S3_ACCESS_KEY: "minioadmin"
      S3_SECRET_KEY: "minioadmin"
      S3_BUCKET: "tracks"
      S3_REGION: "us-east-1"
      S3_USE_SSL: "false"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: on-failure

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: "soundcloud"
      POSTGRES_PASSWORD: "soundcloud"
      POSTGRES_DB: "soundcloud"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U soundcloud -d soundcloud"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2024-06-13T22-53-53Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: "minioadmin"
      MINIO_ROOT_PASSWORD: "minioadmin"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  postgres-data:
  minio-data:
