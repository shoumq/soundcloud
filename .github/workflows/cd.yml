name: Go CD

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  publish:
    name: Build and publish Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/soundcloud-api
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=tag
            type=sha

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Deploy to production server
    runs-on: ubuntu-latest
    needs: publish
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USERNAME }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          script_stop: true
          script: |
            set -eu

            GIT_AUTH_URL="https://x-access-token:${{ secrets.DEPLOY_GIT_TOKEN }}@github.com"

            update_repo() {
              repo_url="$1"
              target_dir="$2"

              if [ ! -d "$target_dir/.git" ]; then
                git clone "$repo_url" "$target_dir"
              fi

              git -C "$target_dir" remote set-url origin "$repo_url"
              git -C "$target_dir" fetch --all --prune
              branch="$(git -C "$target_dir" remote show origin | sed -n '/HEAD branch/s/.*: //p')"
              git -C "$target_dir" checkout "$branch"
              git -C "$target_dir" pull --ff-only origin "$branch"
            }

            mkdir -p /opt
            update_repo "$GIT_AUTH_URL/shoumq/soundcloud.git" /opt/soundcloud
            update_repo "$GIT_AUTH_URL/shoumq/soundcloud-front.git" /opt/soundcloud-front

            if [ ! -f /opt/soundcloud/.env.production ]; then
              cp /opt/soundcloud/.env.production.example /opt/soundcloud/.env.production
            fi

            cd /opt/soundcloud
            docker compose -f docker-compose.prod.yml up -d --build --remove-orphans
